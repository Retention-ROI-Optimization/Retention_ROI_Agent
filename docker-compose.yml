services:
  redis:
    image: redis:7-alpine
    container_name: retention-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: retention-api
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      RETENTION_API_HOST: 0.0.0.0
      RETENTION_API_PORT: 8000
      RETENTION_API_DATA_DIR: data/raw
      RETENTION_MODEL_DIR: models
      RETENTION_RESULT_DIR: results
      RETENTION_REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: retention-dashboard
    restart: unless-stopped       # OOM 등으로 죽으면 자동 재시작
    depends_on:
      - api
    environment:
      RETENTION_API_BASE_URL: http://api:8000
      PYTHONPATH: /app
      # Streamlit 추가 안정화 설정
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "1024"
      STREAMLIT_SERVER_MAX_MESSAGE_SIZE: "512"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: "none"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    deploy:
      resources:
        limits:
          memory: 6G              # 큰 CSV 업로드 + 학습 처리용
        reservations:
          memory: 2G
