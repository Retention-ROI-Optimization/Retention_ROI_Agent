services:
  redis:
    image: redis:7-alpine
    container_name: retention-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: retention-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: retention_db
      POSTGRES_USER: retention_user
      POSTGRES_PASSWORD: retention_password
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - retention_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retention_user -d retention_db"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: retention-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      RETENTION_API_HOST: 0.0.0.0
      RETENTION_API_PORT: 8000
      RETENTION_API_DATA_DIR: data/raw
      RETENTION_MODEL_DIR: models
      RETENTION_RESULT_DIR: results
      RETENTION_REDIS_URL: redis://redis:6379/0
      # Redis is used as cache-aside storage for expensive live-score/action queries.
      # Realtime demo events are stored in PostgreSQL; Redis Streams are not required for user-live mode.
      RETENTION_CACHE_TTL_SECONDS: "20"
      RETENTION_CACHE_PREFIX: retention-cache

      # user mode live serving DB.
      # 컨테이너 내부에서는 localhost가 아니라 compose 서비스명인 postgres로 접속해야 한다.
      RETENTION_USER_DB_URL: postgresql+psycopg://retention_user:retention_password@postgres:5432/retention_db

      PYTHONPATH: /app
      TZ: Asia/Seoul
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: retention-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      RETENTION_API_BASE_URL: http://api:8000
      RETENTION_REDIS_URL: redis://redis:6379/0
      RETENTION_CACHE_TTL_SECONDS: "20"
      PYTHONPATH: /app
      TZ: Asia/Seoul

      # Streamlit 추가 안정화 설정
      STREAMLIT_SERVER_MAX_UPLOAD_SIZE: "1024"
      STREAMLIT_SERVER_MAX_MESSAGE_SIZE: "512"
      STREAMLIT_SERVER_FILE_WATCHER_TYPE: "none"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health', timeout=3).read()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

volumes:
  retention_postgres_data:
